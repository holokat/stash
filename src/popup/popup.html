<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stash</title>
    <link rel="stylesheet" href="../../assets/fonts/fonts.css" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup" aria-live="polite">
      <section class="hero">
        <div class="hero-icon" aria-hidden="true">
          <span class="hero-icon-fill"></span>
          <svg viewBox="0 0 34 34" class="hero-icon-svg">
            <circle cx="17" cy="17" r="11" stroke="#1a0f0a" stroke-width="1.4" opacity=".4"></circle>
            <circle cx="17" cy="17" r="9" stroke="#1a0f0a" stroke-width="1.7"></circle>
            <g stroke="#1a0f0a" stroke-width="1.8" stroke-linecap="round">
              <path d="M19 19 22.7 22.7"></path>
              <path d="M15 19 11.3 22.7"></path>
              <path d="M15 15 11.3 11.3"></path>
              <path d="M19 15 22.7 11.3"></path>
            </g>
            <circle cx="17" cy="17" r="2.6" fill="#1a0f0a"></circle>
          </svg>
        </div>
        <div>
          <p class="eyebrow">STASH</p>
          <h1 id="statusTitle">Saved to your stash</h1>
          <p id="pageMeta" class="meta">Loading current page…</p>
        </div>
      </section>

      <section class="field-wrap">
        <label class="field-label" for="tagInput">Tags</label>
        <div class="tags-input" id="tagsInputWrap">
          <div id="tagChips" class="tag-chips"></div>
          <input id="tagInput" type="text" placeholder="Add tags" autocomplete="off" />
        </div>
        <div id="tagSuggestions" class="tag-suggestions"></div>
      </section>

      <section class="field-wrap">
        <label class="field-label" for="noteInput">Note</label>
        <textarea id="noteInput" rows="4" placeholder="Add a quick thought, context, or why this matters."></textarea>
      </section>

      <footer class="actions">
        <button id="copyBtn" class="ghost-btn" type="button">Copy URL</button>
        <button id="openLibraryBtn" class="ghost-btn" type="button">Open Vault</button>
        <button id="doneBtn" class="primary-btn" type="button">Done</button>
      </footer>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
