<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stash this tab</title>
  <link rel="stylesheet" href="fonts/fonts.css">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      width: 380px;
      background: #0A0A0C;
      color: #F4F2EE;
      font-family: 'Space Grotesk', sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    input, textarea { outline: none; border: none; font-family: inherit; background: transparent; color: inherit; resize: none; }
    img { outline: 1px solid rgba(255,255,255,.1); outline-offset: -1px; }
    input::placeholder, textarea::placeholder { color: #6f6f78; }
    .vsi { transition-property: filter, background-color, border-color, color, transform; transition-duration: .18s; transition-timing-function: ease; }
    .vsi:hover { filter: brightness(1.14); }
    .chip { transition-property: filter, transform, background-color, border-color, color; transition-duration: .18s; transition-timing-function: ease; }
    .chip:hover { filter: brightness(1.12); transform: translateY(-1px); }
    .btn { transition: transform .18s ease, filter .18s ease, background .18s ease, border-color .18s ease; }
    .btn:hover { filter: brightness(1.08); }
    .btnP:hover { transform: translateY(-1px); }
    .btnG:hover { background: rgba(255,255,255,.07); border-color: rgba(255,255,255,.2); }
    .titleShortcut, .btnKbd { display: inline-flex; align-items: center; padding: 3px 6px; border: 1px solid rgba(255,255,255,.12); border-radius: 7px; background: rgba(255,255,255,.055); color: #ffbd8d; font-family: 'JetBrains Mono', monospace; font-size: 10px; line-height: 1; white-space: nowrap; }
    .titleShortcut { margin-left: 8px; vertical-align: 3px; }
    .btnKbd { margin-left: 3px; color: #bdbdc5; }
    textarea::-webkit-scrollbar { width: 8px; }
    textarea::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); border-radius: 8px; }
    @keyframes pIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    @keyframes glow { 0%,100% { opacity:.55; } 50% { opacity:.85; } }
    #root { animation: pIn .24s cubic-bezier(.2,.8,.2,1); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="popup.js"></script>
</body>
</html>
